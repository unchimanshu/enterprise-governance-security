rules:
  # SEC-001: AWS Access Key ID (format: AKIA/ABIA/ACCA/ASIA + 16 alphanumeric chars)
  - id: sec-aws-access-key-id
    pattern-regex: '(AKIA|ABIA|ACCA|ASIA)[A-Z0-9]{16}'
    message: "SEC-001: AWS Access Key ID detected in source code. Rotate the key immediately and use IAM roles or environment variables instead."
    languages: [python]
    severity: ERROR

  # SEC-002: AWS Secret Access Key (variable name pattern with long base64-like value)
  - id: sec-aws-secret-access-key
    patterns:
      - pattern: $VAR = "$VALUE"
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i).*(aws_secret|aws_secret_access_key|secret_access_key).*
      - metavariable-regex:
          metavariable: $VALUE
          regex: '[A-Za-z0-9/+=]{40}'
    message: "SEC-002: AWS Secret Access Key detected in variable '$VAR'. Rotate and move to a secrets manager."
    languages: [python]
    severity: ERROR

  # SEC-003: OpenAI API key (format: sk- followed by alphanumeric)
  - id: sec-openai-api-key
    pattern-regex: 'sk-[A-Za-z0-9]{32,}'
    message: "SEC-003: OpenAI API key detected. Revoke it at platform.openai.com/api-keys and move to an environment variable."
    languages: [python]
    severity: ERROR

  # SEC-004: GitHub tokens (classic PATs, fine-grained, and app tokens)
  - id: sec-github-token
    pattern-regex: '(ghp_[A-Za-z0-9]{36}|ghs_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{82})'
    message: "SEC-004: GitHub personal access token detected. Revoke it at github.com/settings/tokens immediately."
    languages: [python]
    severity: ERROR

  # SEC-005: Stripe live secret and publishable keys
  - id: sec-stripe-key
    pattern-regex: '(sk_live_[A-Za-z0-9]{24,}|rk_live_[A-Za-z0-9]{24,})'
    message: "SEC-005: Stripe live secret key detected. Roll the key at dashboard.stripe.com/apikeys immediately."
    languages: [python]
    severity: ERROR

  # SEC-006: Google API key (format: AIza + 35 chars)
  - id: sec-google-api-key
    pattern-regex: 'AIza[A-Za-z0-9\-_]{35}'
    message: "SEC-006: Google API key detected. Restrict or regenerate it in Google Cloud Console."
    languages: [python]
    severity: ERROR

  # SEC-007: PEM private keys (RSA, EC, generic)
  - id: sec-private-key
    pattern-regex: '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
    message: "SEC-007: PEM private key detected in source code. Remove it immediately and regenerate. Store in a secrets manager."
    languages: [python]
    severity: ERROR

  # SEC-008: Generic hardcoded credentials (password, secret, api_key, token assigned to a string)
  - id: sec-hardcoded-credential
    patterns:
      - pattern-either:
          - pattern: $VAR = "$VALUE"
          - pattern: $VAR = '$VALUE'
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)^.*(password|passwd|pwd|secret|api_key|apikey|api_secret|auth_token|access_token|private_key|client_secret|app_secret|encryption_key).*$
      - metavariable-regex:
          metavariable: $VALUE
          regex: .{8,}
    message: "SEC-008: Hardcoded credential in variable '$VAR'. Replace with os.environ.get('...') or a secrets manager call."
    languages: [python]
    severity: ERROR

  # SEC-009: Slack tokens (bot, user, and app-level)
  - id: sec-slack-token
    pattern-regex: 'xox[baprs]-[A-Za-z0-9\-]+'
    message: "SEC-009: Slack token detected. Revoke it at api.slack.com/apps and move to an environment variable."
    languages: [python]
    severity: ERROR

  # SEC-010: Database connection strings with embedded credentials
  - id: sec-database-url-credentials
    pattern-regex: '(postgresql|postgres|mysql|mongodb|redis|mssql|oracle):\/\/[^:@\s]+:[^@\s]+@'
    message: "SEC-010: Database connection string with embedded credentials detected. Move to DATABASE_URL environment variable or a secrets manager."
    languages: [python]
    severity: ERROR
